<div class="page-container">

  <p-toolbar>
    <ng-template #start>
      <p-menu #menu [model]="menuItems" [popup]="true" />
      <p-button
        icon="pi pi-bars"
        severity="secondary"
        [rounded]="true"
        (click)="menu.toggle($event)" />
    </ng-template>
    <ng-template #center>
      <h1 class="app-title">PictoCom</h1>
    </ng-template>
    <ng-template #end>
      <p-button label="Ayuda" icon="pi pi-question-circle" severity="secondary" [rounded]="true" />
    </ng-template>
  </p-toolbar>

  <main class="main-content">

    <div class="central-panels">
      <div class="panel-button panel-login" (click)="showLoginDialog()">
        <span class="panel-icon">🔐</span>
        <span class="panel-label">Iniciar sesión</span>
      </div>
      <div class="panel-button panel-register" (click)="showRegisterDialog()">
        <span class="panel-icon">📝</span>
        <span class="panel-label">Registrarse</span>
      </div>
      <div class="panel-button panel-guest" (click)="onGuest()">
        <span class="panel-icon">👤</span>
        <span class="panel-label">Entrar sin registrarse</span>
      </div>
    </div>

    <div class="tutorial-buttons">
      <p-button label="Tutorial 1" severity="secondary" [rounded]="true" />
      <p-button label="Tutorial 2" severity="secondary" [rounded]="true" />
      <p-button label="Tutorial 3" severity="secondary" [rounded]="true" />
      <p-button label="Guía de uso" severity="secondary" [rounded]="true" />
    </div>

  </main>
</div>

<!-- Dialog login -->
<p-dialog
  header="Iniciar sesión"
  [(visible)]="visibleLogin"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '28rem' }"
  [draggable]="false"
  [resizable]="false"
  (onHide)="onCancelLogin()" >

<!-- Error message in login dialog -->
@if (loginError) {
  <div
    class="error-message"
    role="alert"
    aria-live="assertive">
    <span class="error-icon" aria-hidden="true">⚠️</span>
    <span>{{ loginError }}</span>
  </div>
}

  <div class="flex items-center gap-4 mb-4">
    <label for="email" class="font-semibold w-24">Email</label>
    <!-- [(ngModel)] conecta el input con la variable loginEmail del .ts -->
    <!-- Cuando el usuario escribe, loginEmail se actualiza automáticamente -->
    <input
      pInputText
      id="email"
      class="flex-auto"
      [(ngModel)]="loginEmail"
      autocomplete="off" />
  </div>

  <div class="flex items-center gap-4 mb-4">
    <label for="password" class="font-semibold w-24">Contraseña</label>
    <input
      pInputText
      id="password"
      type="password"
      class="flex-auto"
      [(ngModel)]="loginPassword"
      autocomplete="off" />
  </div>

  <div class="flex justify-end gap-2 mt-4">
    <p-button
      label="Cancelar"
      severity="secondary"
      (click)="onCancelLogin()"
      [disabled]="loading" />
    <p-button
      label="Entrar"
      (click)="onLogin()"
      [loading]="loading" />
  </div>

</p-dialog>

<!-- Dialog register -->
<p-dialog
  header="Crear cuenta"
  [(visible)]="visibleRegister"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '28rem' }"
  [draggable]="false"
  [resizable]="false"
  (onHide)="onCancelRegister()" >
  

<!-- Dialog register error message -->
@if (registerError) {
  <div
    class="error-message"
    role="alert"
    aria-live="assertive">
    <span class="error-icon" aria-hidden="true">⚠️</span>
    <span>{{ registerError }}</span>
  </div>
}

  <div class="flex items-center gap-4 mb-4">
    <label for="reg-name" class="font-semibold w-24">Nombre</label>
    <input
      pInputText
      id="reg-name"
      class="flex-auto"
      [(ngModel)]="registerName"
      autocomplete="off" />
  </div>

  <div class="flex items-center gap-4 mb-4">
    <label for="reg-email" class="font-semibold w-24">Email</label>
    <input
      pInputText
      id="reg-email"
      class="flex-auto"
      [(ngModel)]="registerEmail"
      autocomplete="off" />
  </div>

  <div class="flex items-center gap-4 mb-4">
    <label for="reg-password" class="font-semibold w-24">Contraseña</label>
    <input
      pInputText
      id="reg-password"
      type="password"
      class="flex-auto"
      [(ngModel)]="registerPassword"
      autocomplete="off" />
  </div>

  <div class="flex justify-end gap-2 mt-4">
    <p-button
      label="Cancelar"
      severity="secondary"
      (click)="onCancelRegister()"
      [disabled]="loading" />
    <p-button
      label="Registrarse"
      (click)="onRegister()"
      [loading]="loading" />
  </div>

</p-dialog>
