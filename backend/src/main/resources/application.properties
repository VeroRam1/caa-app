# ========== Application ==========
spring.application.name=caa-backend
server.port=8080

jwt.secret=${JWT_SECRET:caa-backend-secret-key-for-jwt-authentication-2024-minimum-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========== H2 Database (In-Memory) ==========
#spring.datasource.url=jdbc:h2:mem:caa_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# ========== H2 Console ==========
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.h2.console.settings.web-allow-others=false

# ========== MySQL ==========
spring.datasource.url=jdbc:mysql://localhost:3306/pictocom?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== JPA/Hibernate ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ========== Data Initialization ==========
spring.sql.init.mode=never

# ========== Logging ==========
logging.level.com.caa.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ========== Swagger/OpenAPI ==========
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ========== Ignore favicon errors ==========
spring.mvc.log-resolved-exception=false

# ========== Uploading files ================
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB